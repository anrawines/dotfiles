#################################
#             Shadows           #
#################################

shadow-radius = 5;

# The opacity of shadows. (0.0 - 1.0, defaults to 0.75)
# shadow-opacity = .75

# The left offset for shadows, in pixels. (defaults to -15)
# shadow-offset-x = -15
shadow-offset-x = -7;

# The top offset for shadows, in pixels. (defaults to -15)
# shadow-offset-y = -15
shadow-offset-y = -7;

# Specify a list of conditions of windows that should have no shadow.
#
# examples:
#   shadow-exclude = "n:e:Notification";
#
# shadow-exclude = []
shadow-exclude = [
  "name = 'Notification'",
  "window_type = 'tooltip'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'xcolor'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [
  "class_g = 'xcolor'"
];

#################################
#   Transparency / Opacity      #
#################################

# Opacity of inactive windows. (0.1 - 1.0, defaults to 1.0)
# inactive-opacity = 1
inactive-opacity = 1;
focus-exclude = [
  "class_g = 'xcolor'"
];

# Opacity of window titlebars and borders. (0.1 - 1.0, disabled by default)
#frame-opacity = 1.0;
frame-opacity = 0.7;

# Let inactive opacity set by -i override the '_NET_WM_WINDOW_OPACITY' values of windows.
# inactive-opacity-override = true
inactive-opacity-override = false;

# Default opacity for active windows. (0.0 - 1.0, defaults to 1.0)
# active-opacity = 0.93

# Dim inactive windows. (0.0 - 1.0, defaults to 0.0)
inactive-dim = 0.4

# opacity-rule = []
# opacity-rule = [ "94:class_g = 'Geany'", "95:class_g = 'com.mitchellh.ghostty'" ];
# opacity-rule = [ "94:class_g = 'Geany'"];
opacity-rule = ["85:class_g = 'st'",
				"90:class_g = 'wezterm'",
				"90:class_g = 'Alacritty'",
				"90:class_g = 'kitty'",
				"100:window_type = 'menu'",
				"100:window_type = 'dropdown_menu'",
				"100:window_type = 'popup_menu'",
				"100:window_type = 'tooltip'",
				"100:window_type = 'utility'",
				];

#################################
#           Corners             #
#################################

# Sets the radius of rounded window corners. When > 0, the compositor will
# round the corners of windows. Does not interact well with
# `transparent-clipping`.
corner-radius = 3;

# Exclude conditions for rounded corners.
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'tooltip'",
  "window_type = 'desktop'",
  "class_g = 'Rofi'",
  "class_g = 'xcolor'",
  "class_g = 'dmenu'"
];
corner-radius-rules = [ "2:class_g = 'i3-frame'" ];

#################################
#     Background-Blurring       #
#################################
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 1;
blur-size = 12
blur-deviation = true


blur-kern = "3x3box";

# Exclude conditions for background blur.
# blur-background-exclude = []
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  "window_type = 'utility'",
  "class_g = 'xcolor'",
  "_GTK_FRAME_EXTENTS@"
];

#################################
#       General Settings        #
#################################

# Specify the backend to use: `xrender`, `glx`, `egl` or `xr_glx_hybrid`.
# `xrender` is the default one.
#
backend = "glx"
# backend = "xrender";

glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Use higher precision during rendering, and apply dither when presenting the
# rendered screen. Reduces banding artifacts, but might cause performance
# degradation. Only works with OpenGL.
dithered-present = false;

# Enable/disable VSync.
# vsync = false
vsync = true;

# Try to detect WM windows (a non-override-redirect window with no
# child that has 'WM_STATE') and mark them as active.
#
# mark-wmwin-focused = false
mark-wmwin-focused = true;

# Mark override-redirect windows that doesn't have a child window with 'WM_STATE' focused.
# mark-ovredir-focused = false
mark-ovredir-focused = true;

# Try to detect windows with rounded corners and don't consider them
# shaped windows. The accuracy is not very high, unfortunately.
#
# detect-rounded-corners = false
detect-rounded-corners = true;

# Detect '_NET_WM_WINDOW_OPACITY' on client windows, useful for window managers
# not passing '_NET_WM_WINDOW_OPACITY' of client windows to frame windows.
#
# detect-client-opacity = false
detect-client-opacity = true;

# Use EWMH '_NET_ACTIVE_WINDOW' to determine currently focused window,
# rather than listening to 'FocusIn'/'FocusOut' event. Might have more accuracy,
# provided that the WM supports it.
#
# use-ewmh-active-win = false
#
# detect-transient = false
detect-transient = true;

# Disable the use of damage information.
# This cause the whole screen to be redrawn every time, instead of the part of the screen
# has actually changed. Potentially degrades the performance, but might fix some artifacts.
# The opposing option is use-damage
#
# no-use-damage = false
use-damage = false;

# Use X Sync fence to sync clients' draw calls, to make sure all draw
# calls are finished before picom starts drawing. Needed on nvidia-drivers
# with GLX backend for some users.
#
# xrender-sync-fence = false

# GLX backend: Use specified GLSL fragment shader for rendering window
# contents. Read the man page for a detailed explanation of the interface.
#
# window-shader-fg = "default"

# Set the log level. Possible values are:
#  "trace", "debug", "info", "warn", "error"
# in increasing level of importance. Case doesn't matter.
# If using the "TRACE" log level, it's better to log into a file
# using *--log-file*, since it can generate a huge stream of logs.
#
# log-level = "debug"
log-level = "warn";

# Window type settings
#
# 'WINDOW_TYPE' is one of the 15 window types defined in EWMH standard:
#   "unknown", "desktop", "dock", "toolbar", "menu", "utility",
#   "splash", "dialog", "normal", "dropdown_menu", "popup_menu",
#   "tooltip", "notification", "combo", and "dnd".
#
# Following per window-type options are available: ::
#
#   fade, shadow:::
#   Controls window-type-specific shadow and fade settings.
#
#   opacity:::
#   Controls default opacity of the window type.
#
#   focus:::
#   Controls whether the window of this type is to be always considered focused.
#   (By default, all window types except "normal" and "dialog" has this on.)
#
#   full-shadow:::
#   Controls whether shadow is drawn under the parts of the window that you
#   normally won't be able to see. Useful when the window has parts of it
#   transparent, and you want shadows in those areas.
#
#   clip-shadow-above:::
#   Controls whether shadows that would have been drawn above the window should
#   be clipped. Useful for dock windows that should have no shadow painted on top.
#
#   redir-ignore:::
#   Controls whether this type of windows should cause screen to become
#   redirected again after been unredirected. If you have unredir-if-possible
#   set, and doesn't want certain window to cause unnecessary screen redirection,
#   you can set this to `true`.
#
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
  # Tambahkan ini agar semua jendela utility (termasuk xcolor) tidak diproses berlebihan
  utility = { shadow = false; fade = false; focus = true; };
};

