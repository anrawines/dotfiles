#global type
# Sifat global untuk semua aplikasi
for_window [window_role="pop-up"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_role="dialog"] floating enable, resize set 600 300
for_window [window_role="menu"] floating enable

for_window [window_role="About"] floating enable
for_window [window_role="Preferences"] floating enable
for_window [title="(?:Open|Save) (?:File|Folder|As)"] floating enable, resize set 800 600
for_window [title="Picture in picture"] floating enable, sticky enable

## Menangkap Replace, Rename, Open, atau Save dalam satu baris
