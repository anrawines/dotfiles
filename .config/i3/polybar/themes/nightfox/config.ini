[global/wm]
include-file = colors.ini
include-file = modules.ini
include-file = decor.ini

[bar/main]
width = 100%
height = 2.5%
radius = 0

; dpi = 96

background = ${colors.navy}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = ${colors.border}

padding-left = 0
padding-right = 0

module-margin = 0

separator = 
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font Propo:size=12;3"
font-1 = "JetBrainsMono Nerd Font Propo:size=14;3"

modules-left = xworkspaces xwindow
modules-center =
modules-right = sep7 filesystem sep6 memory sep5 cpu sep4 wlan sep3 eth sep2 battery gtg date sep1 pulseaudio systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true




[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
