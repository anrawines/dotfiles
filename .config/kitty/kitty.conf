# SET DEFAULT SHELL
#shell /usr/bin/zsh
shell fish

term xterm-256color

#cursor
#cursor_shape block
cursor_shape beam
cursor_blink_interval     0
cursor_stop_blinking_after 15.0
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0

cursor_trail 1

# Visual
allow_remote_control yes
background_opacity 0.7

# Font (adjust to your preference)

font_family 	JetBrainsMono Nerd Font
italic_font      auto
bold_font        auto
bold_italic_font auto
font_size        12.0


adjust_line_height 3
adjust_column_width 0

force_ltr yes
disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2

# Terminal bell
visual_bell_duration 0.0
enable_audio_bell no
window_alert_on_bell yes
command_on_bell none

# Window
remember_window_size   no
initial_window_width   700
initial_window_height  450
window_padding_width   0
window_border_width 1
window_margin_width 1
single_window_margin_width 0


hide_window_decorations no
confirm_os_window_close 0


# Scrollback
scrollback_lines 10000
scrollback_pager nvim -c 'setlocal buftype=nofile bufhidden=hide noswapfile nonumber norelativenumber nolist showtabline=0 foldcolumn=0|Man!' -c "autocmd VimEnter * normal G" -
scrollback_pager_history_size 0
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 3.0

# Performance
repaint_delay    10
input_delay 1
sync_to_monitor no
resize_debounce_time 0
# resize_draw_strategy static
resize_in_steps no

# URLs
url_style double
# open_url_modifiers ctrl+shift
open_url_with firefox
url_prefixes http https file ftp

# Selection
# rectangle_select_modifiers ctrl+alt
# terminal_select_modifiers shift
select_by_word_characters :@-./_~?&=%+#
copy_on_select yes
strip_trailing_spaces smart


# Tab bar
tab_bar_edge top
tab_bar_min_tabs 2
tab_bar_margin_width 6.0

tab_switch_strategy previous
active_tab_font_style bold
inactive_tab_font_style normal

# bar_style : fade, slant, separator, powerline, custom, hidden
tab_bar_style powerline
# tab style : powerline, slanted, angled, round
tab_powerline_style angled
tab_activity_symbol "0 "
tab_title_template "{fmt.bold}{index}{'(%d)'%num_windows if num_windows > 1 else ''}: {(title.replace('ss@msi:', '')[:6]+'…'+title.replace('ss@msi:', '')[-6:]) if title.replace('ss@msi:', '').rindex(title.replace('ss@msi:', '')[-1]) + 1 > 13 else title.replace('ss@msi:', '')}"
active_tab_title_template "{'(%d)':%num_windows if num_windows > 1 else ''} {title}"



# -------- Keybind -------
# Change current window opacity
dynamic_background_opacity yes
map alt+minus      set_background_opacity -0.1
map alt+plus       set_background_opacity +0.1
map alt+asterisk   set_background_opacity default

# Zoom
map alt+shift+f change_font_size current +1.00
map alt+f change_font_size current -1.00

# Restore font size
map alt+` change_font_size current 15

# tabs
map alt+t new_tab
map alt+w close_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 select_tab
map alt+h previous_tab
map alt+l next_tab

# Open new terminal window
map alt+o combine :  change_font_size current +1.00 : new_os_window
enabled_layouts tall,*

# Split window horizontally
map alt+/ launch --location=hsplit --type=window

# Split window vertically
map alt+\ launch --location=vsplit --type=window

# Open overlay window
map alt+ESC launch --location=overlay

# Rotate the current split, changing its split axis from vertical to
# horizontal or vice versa
map f7 layout_action rotate

map alt+left resize_window narrower
map alt+right resize_window wider
map alt+up resize_window taller
map alt+down resize_window shorter

# Move the active window in the indicated direction
map shift+up move_window up
map shift+left move_window left
map shift+right move_window right
map shift+down move_window down

# Move the active window to the indicated screen edge
map ctrl+shift+up layout_action move_to_screen_edge top
map ctrl+shift+left layout_action move_to_screen_edge left
map ctrl+shift+right layout_action move_to_screen_edge right
map ctrl+shift+down layout_action move_to_screen_edge bottom

# Switch focus to the neighboring window in the indicated direction
map alt+shift+h neighboring_window left
map alt+shift+l neighboring_window right
map alt+shift+k neighboring_window up
map alt+shift+j neighboring_window down

# Vim motion
map alt+k send_text all \033[A
map alt+j send_text all \033[B
map alt+h send_text all \033[D
map alt+l send_text all \033[C

# new
map alt+enter launch --cwd=current

map ctrl+alt+k scroll_line_up
map ctrl+alt+j scroll_line_down

# -------- Color ---------
# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# BACKGROUND
#background_image ~/.config/kitty/backgrounds/ghost2.png
background_image_layout centered

background_blur 90
background_tint 0.97
background_tint_gaps -10

# Colors (you can use a theme later)
background #1d1f21
foreground #c5c8c6

# highlighting
selection_foreground #ffffff
selection_background #14b8a6


# URL underline color when hovering with mouse
url_color               #f5e0dc

# kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# tab bar colors
tab_separator " ┇"
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #23252E
tab_bar_background      #11111b

# colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

