## LEFT

[sudo]
disabled = false
symbol = "рҹ§ҷ"
style = "bg:#012445"
format = "[$symbol]($style)"

[os]
disabled = false
format = '[$symbol ](fg:#000000 bg:#313244)'
style = "bg:#a3aed2 fg:#090c0c" # Style harus sama dengan username

[os.symbols]
"Alpine" = "пҢҖ"
"Arch" =  " пҢғ "
"CentOS" = "пҢ„"
"Debian" = "пҢҶ"
"Fedora" = "пҢҠ"
"Gentoo" = "пҢҚ"
"Linux" =  "п…ј"
"Macos" = "п…№"
"Manjaro" = "пҢ’"
"Mint" =  "пҢҺ"
"NixOS" =  "пҢ“"
"Raspbian" =  "пҢ•"
"Ubuntu" = "пҢӣ"
"Windows" = "оңҸ" 

[username]
show_always = false
style_user = "bg:#a3aed2 fg:#090c0c"
format = "[ $user ]($style)" # Hapus spasi manual agar tidak double dengan logo

[hostname]
disabled = true
ssh_only = true
style = "#d3b987"
format = "[@$hostname]($style)[ вқҜ](#767676)"


[directory]
style = "fg:#c6e7ff bg:#002240 italic"
format = "[ $path ]($style)"
truncation_length = 3
home_symbol = "оӯҶ ~/"
truncation_symbol = 'оҜҹ '
read_only = 'уұ§ө '
read_only_style = ''

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Project" = "у°ІӢ "

# --- Git Section (Tetap sama, sudah benar) ---
[git_branch]
symbol = "п„“ пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "#002240"
format = "(\b[ ](bg:$style fg:#769ff0)$conflicted$staged$modified$renamed$deleted$untracked$stashed$ahead_behind)"
conflicted = "[пҒұ ](bold fg:88 bg:#002240)[ п‘Җ ${count} ](fg:#769ff0 bg:#002240)"
staged = "[пҒ§ $count ](fg:#769ff0 bg:#002240)"
modified = "[пЈӘ ${count} ](fg:#769ff0 bg:#002240)"
renamed = "[пҖ« ${count} ](fg:#769ff0 bg:#002240)"
deleted = "[пҖ” ${count} ](fg:#769ff0 bg:#002240)"
untracked = "[?${count} ](fg:#769ff0 bg:#002240)"
stashed = "[п’Ү ${count} ](fg:#769ff0 bg:#002240)"
ahead = "[пғ® ${count} ](fg:#523333 bg:#002240)"
behind = "[пғӯ ${count} ](fg:#769ff0 bg:#002240)"
diverged = "[пҒұ ](fg:88 bg:#002240)[ пӯҖ ](fg:#769ff0 bg:#002240)[пғ® ${ahead_count} ](fg:#769ff0 bg:#002240)[пғӯ ${behind_count} ](fg:#769ff0 bg:#002240)"

## RIGHT

[jobs]
disabled = false
format = "[$number]($style)"

[status]
disabled = false
map_symbol = false
format = "[$symbol$status]($style)"
sigint_symbol = "[вңҳ](fg:#d60202 bg:#012445)"
style = "bg:#012445"
success_symbol = "[вң” ](fg:green bg:#012445)"
symbol = "[вңҳ](fg:#d60202 bg:#012445)"

[cmd_duration]
min_time = 0
style = "bg:#012445"
format = "([ $duration пү’ ]($style))"

[shell]
format = '[ п’ү $indicator ](fg:#c6e7ff bg:#012445)'
unknown_indicator = 'shell'
powershell_indicator = 'у°ЁҠ powershell'
fish_indicator = 'о№Ғ fish'
zsh_indicator = 'оқ  zsh'
bash_indicator = 'уұҶғ bash'
disabled = false

[time]
disabled = false
time_format = "%R" 
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

