geometry=70%x70%

# --- Mouse Bindings ---
MBTN_LEFT     ignore              # Prevent accidental clicks
MBTN_LEFT_DBL cycle fullscreen    # Double-click for fullscreen
MBTN_RIGHT    cycle pause         # Right-click to play/pause
MBTN_MID      quit  # Middle-click shows/hides UI

# --- Side Mouse Buttons ---
MBTN_BACK     seek -5    # Go to previous file in playlist
MBTN_FORWARD  seek 5    # Go to next file in playlist

# --- Mouse Wheel (Volume & Seeking) ---
WHEEL_UP      add volume 2        # Scroll up to increase volume
WHEEL_DOWN    add volume -2       # Scroll down to decrease volume
WHEEL_LEFT    seek -5             # Scroll left to seek back 5s
WHEEL_RIGHT   seek 5              # Scroll right to seek forward 5s

# --- Common Keyboard Bindings ---
UP            add volume 5        # Up arrow for volume
DOWN          add volume -5       # Down arrow for volume
Shift+UP      seek 60             # Seek 1 minute forward
Shift+DOWN    seek -60            # Seek 1 minute backward
Ctrl+q        quit                # Quickly close the player
