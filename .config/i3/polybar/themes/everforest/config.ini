[global/wm]

margin-bottom = 0
margin-top = 0

include-file = modules.ini

[color]
bg = #232136
bg1 = #232133
bg2 = #38354c
bg-alt = #00232136
fg = #e0def4

trans = #00000000
white = #FFFFFF
black = #000000

red = #ea6f91
pink = #d3869b
purple = #c3a5e6
blue = #34738e
cyan = #eabbb9
teal = #00B19F
green = #9bced7
lime = #8ec07c
yellow = #f1ca93
amber = #fac33b
orange = #f08641
brown = #AC8476
grey = #384148
indigo = #6C77BB
blue-gray = #6D8895

[bar/main]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true

bottom = false
fixed-center = false

width = 100%
height = 2%

offset-x = 0%
offset-y = 0

background = ${color.bg}
foreground = ${color.fg}

radius-bottom = 25

line-size = 3
line-color = ${color.blue}

border-size = 10
border-color = ${color.bg}

padding-left = 2
padding-right = 1

module-margin-left = 0
module-margin-right = 0

font-0 = "JetBrainsMono Nerd Font Propo:style=Regular:size=14;3"
font-1 = "Material Design Icons Desktop:size=13;3"
font-2 = "Font Awesome 7 Free Solid:size=10;3"
font-3 = "MesloLGS NF:style=Regular:size=13;3"

;Modules availables but not active:
;	brightness		weather		xkeyboard
modules-left = launcher sep boi bod xworkspaces boi bod sep title
modules-center =
modules-right = batr battery batl bri filesystem brd byi cpu byd bpi memory bpd  boi eth bod bii date bid  bbi pulseaudio bbd  boi bod tray sep power sep

separator =
dim-value = 1.0
;locale = es_MX.UTF-8

wm-restack = i3
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[settings]

screenchange-reload = true

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
