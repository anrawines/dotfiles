[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 20

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP0

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5
time-format = %H:%M

; Available tags:
;   <label-charging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-charging>
format-charging = <label-charging>
format-charging-foreground = ${colors.background}
format-charging-background = ${colors.background-alt}

format-charging-prefix = "¾▒ś¢"
format-charging-prefix-font = 3
format-charging-prefix-foreground = ${colors.background}
format-charging-prefix-background = ${colors.color9}
format-charging-prefix-padding = ${var.pad}

; Available tags:
;   <label-discharging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-discharging>
format-discharging =  <label-discharging>
format-discharging-foreground = ${colors.background}
format-discharging-background = ${colors.background-alt}

format-discharging-prefix = "Ņ½É"
format-discharging-prefix-font = 3
format-discharging-prefix-foreground = ${colors.background}
format-discharging-prefix-background = ${colors.color9}
format-discharging-prefix-padding = ${var.pad}

; Available tags:
;   <label-full> (default)
;   <bar-capacity>
;   <ramp-capacity>
format-full = <label-full>
format-full-foreground = ${colors.background}
format-full-background = ${colors.color9}

format-full-prefix = "¾▒Ŗ”"
format-full-prefix-font = 3
format-full-prefix-foreground = ${colors.background}
format-full-prefix-background = ${colors.color9}
format-full-prefix-padding = ${var.pad}


; Format used when battery level drops to low-at
; If not defined, format-discharging is used instead.
; Available tags:
;   <label-low>
;   <animation-low>
;   <bar-capacity>
;   <ramp-capacity>
; New in version 3.6.0
format-low = <animation-low> <label-low> 
format-low-foreground = ${colors.background}
format-low-background = ${colors.background-alt}

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current charge rate in watts)
label-charging =  %percentage:4:4%%
label-charging-foreground = ${colors.foreground}
label-charging-background = ${colors.background-alt}
label-charging-padding = ${var.pad} 

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
label-discharging = %percentage:4:4%% 
label-discharging-foreground = ${colors.foreground}
label-discharging-background = ${colors.background-alt}
label-discharging-padding = ${var.pad} 

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;label-full = Fully charged
label-full = %percentage:4:4%%
label-full-foreground = ${colors.foreground}
label-full-background = ${colors.background-alt}
label-full-padding = ${var.pad} 

; Available tokens:
;   %percentage% (default) - is set to 100 if full-at is reached
;   %percentage_raw%
;   %time%
;   %consumption% (shows current discharge rate in watts)
; New in version 3.6.0
;label-low = BATTERY LOW
label-low = "¾▒ŖĪ"
label-low-foreground = ${colors.foreground}
label-low-background = ${colors.background-alt}
label-low-padding = ${var.pad} 

; Only applies if <ramp-capacity> is used
ramp-capacity-0 = " ’ēä "
ramp-capacity-1 = " ’ēā "
ramp-capacity-2 = " ’ēé "
ramp-capacity-3 = " ’ēü "
ramp-capacity-4 = " ’ēĆ "
ramp-capacity-foreground = ${colors.background}

; Only applies if <bar-capacity> is used
bar-capacity-width = 10

; Only applies if <animation-charging> is used
animation-charging-0 = "’ēä "
animation-charging-1 = "’ēā "
animation-charging-2 = "’ēé "
animation-charging-3 = "’ēü "
animation-charging-4 = "’ēĆ "
; Framerate in milliseconds
animation-charging-framerate = 750

; Only applies if <animation-discharging> is used
animation-discharging-0 = "’ēĆ "
animation-discharging-1 = "’ēü "
animation-discharging-2 = "’ēé "
animation-discharging-3 = "’ēā "
animation-discharging-4 = "’ēä "
; Framerate in milliseconds
animation-discharging-framerate = 500

; Only applies if <animation-low> is used
; New in version 3.6.0
animation-low-0 = !
animation-low-1 = 0
animation-low-framerate = 200


