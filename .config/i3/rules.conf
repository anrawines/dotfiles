# Berdasarkan judul jendela (Case-insensitive) per title
#for_window [title="(?i)open"] floating enable, resize set 600 300
#for_window [title="(?i)save"] floating enable, resize set 600 300
#for_window [title="(?i)confirm"] floating enable, resize set 600 300
#for_window [title="(?i)rename"] floating enable, resize set 600 300
