#for_window [title="(?i)find"] floating enable, resize set 600 300
#for_window [title="(?i)replace"] floating enable, resize set 600 300
#for_window [title="(?i)preferences"] floating enable, resize set 600 300

# set floating window size
for_window [floating] resize set 1080 640
for_window [floating] move position center

# scratchpad terminal
for_window [class="scratchpad"] floating enable, border pixel 10, resize set 950 400, move position center, move position 500 0

for_window [class="Steam.*"] floating enable
for_window [class="qimgv"] floating enable
# for_window [class="mpv"] floating enable, sticky enable
for_window [class="Lxappearance"] floating enable
for_window [class="pavucontrol"] floating enable, sticky enable
for_window [class="st"] floating enable, sticky enable
for_window [class="Galculator"] floating enable, sticky enable


for_window [class="python3"] floating enable
for_window [class="Tk"] floating enable
for_window [class="Tk" title="Modern Translator"] move scratchpad, scratchpad show

# xprop WM_NAME
# xprop WM_CLASS
# xprop WM_WINDOW_ROLE
#set floating mini window size

# Gunakan title="Find" (case-sensitive sesuai output xprop)
for_window [class="Geany" title="Find"] floating enable, resize set 400 300, move position center
for_window [class="Qalculat(e|e-gtk)"] floating enable, border normal 2, resize set 400 300, move to output HDMI-A-0, move position 1190 270
#for_window [class="Tk" title="Modern Translator GUI"] floating enable, resize set 550 450, move position center 

## MPV Player
# Main video window
for_window [class="mpv" title="mpv"] floating enable, \
	border pixel 3, \
    resize set 800 600 \
    
# Alternative matching
for_window [class="mpv" instance="mpv"] floating enable, \
    border pixel 3, \
    resize set 800 600, \
    move to output HDMI-A-0, \
    move position 1090 px 50 px \
    
# Thunar
for_window [class="Thunar" title="Confirm to replace files"] floating enable, \
	border pixel 3, \
    resize set 600 400 \
    
for_window [class="Thunar" title="File Operation Progress"] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position 1000 px 50 px \
    
for_window [class="Thunar" title="Confirm to replace files"] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position 1000 px 50 px \
    
for_window [class="Thunar" title="New Empty File..."] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position center \
    
for_window [class="Thunar" title="Create New Folder"] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position center \
    
for_window [class="Thunar" title="Rename"] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position center \

#Geany
for_window [class="Geany" title="Replace"] floating enable, \
	border pixel 3, \
    resize set 400 200, \
    move position center \
   

#gpg-pass
for_window [instance="pinentry-gtk"] floating enable, resize set 700 300, move position center

#fireefox
# Float Firefox dialogs and managers
for_window [class="firefox" window_role="About"] floating enable
for_window [class="firefox" window_role="Manager"] floating enable
for_window [class="firefox" window_role="Library"] floating enable
#for_window [class="firefox" title="Library"] floating enable
for_window [class="firefox" title="Push To Talk"] floating enable

# scratchpad windows
for_window [class="scratchpad"] floating enable, move scratchpad, scratchpad show, resize set 1080 640, move position center
for_window [class="pulsemixer"] floating enable, move scratchpad, scratchpad show, resize set 1000 600, move position center

# special instance for thunar float (sxhkd)
for_window [instance="thunar_float"] floating enable, resize set 800 500, move position center

#EWW
for_window [class="Eww"] border none
for_window [class="Eww"] floating enable
for_window [instance="Eww - bar"] floating enable

#CONKY
for_window [class="conky"] border none

#YAD
for_window [class="Yad" title="yad-calendar"] floating enable, move position mouse
for_window [class="Yad" title="System Logout"] floating enable, resize set 400 300, move position mouse

#xcorner
# Allow xcorners to stay on top without being tiled
for_window [class="xcorners"] floating enable, border none, sticky enable, focus_mode_none

# assignments
assign [class="firefox"] workspace 1
assign [class="Geany"] workspace 3
#assign [class="Thunar"] workspace 4
assign [class="Gimp"] workspace 5
assign [class="Obs"] workspace 9

# automatic set focus new window if it opens on another workspace then the current:
for_window [class=firefox] focus
for_window [class=Geany] focus
for_window [class=Gimp] focus
for_window [class=Obs] focus
